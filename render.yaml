# Render Blueprint — deploys the ColorPlate GUI + API as one Docker web service.
# In the Render dashboard: New ► Blueprint ► pick this repo. Render reads this file,
# builds the Dockerfile, and provides $PORT automatically.
services:
  - type: web
    name: colorplate
    runtime: docker
    plan: standard        # 2 GB RAM / 1 CPU, always-on (no idle sleep)
    region: oregon
    healthCheckPath: /
    autoDeploy: true
    domains:
      - colorplate.spoolr.io
    disk:
      name: colorplate-data        # persists the SQLite usage DB across deploys
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: COLORPLATE_DATA_DIR
        value: /var/data
      - key: COLORPLATE_SALT        # stable secret for hashing visitor IPs
        generateValue: true
      - key: COLORPLATE_STATS_TOKEN # protects the /stats dashboard
        generateValue: true
