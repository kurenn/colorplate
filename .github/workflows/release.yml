name: Release

# Cut a release by pushing a version tag that matches pyproject's version:
#   git tag v0.1.0 && git push origin v0.1.0
#
# This builds the sdist + wheel, creates a GitHub Release with notes from
# CHANGELOG.md, publishes a container image to GHCR, and (when enabled)
# uploads to PyPI via Trusted Publishing. See RELEASING.md.

on:
  push:
    tags:
      - "v*"

# Least-privilege by default; each job elevates only what it needs.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=$TAG  pyproject=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match pyproject version $PKG. Bump pyproject (and CHANGELOG) to match the tag."
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]"            { flag=1; next }
            flag && (/^## \[/ || /^\[[^][]+\]: /) { flag=0 }
            flag                              { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${GITHUB_REF_NAME}." > RELEASE_NOTES.md
          fi
          echo "----- notes -----"; cat RELEASE_NOTES.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/*
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Enable once the PyPI Trusted Publisher is configured (see RELEASING.md),
    # then set repository variable PUBLISH_TO_PYPI=true. Until then this is skipped.
    if: vars.PUBLISH_TO_PYPI == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/colorplate
    permissions:
      id-token: write # OIDC for Trusted Publishing — no API tokens needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  docker:
    name: Container image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
