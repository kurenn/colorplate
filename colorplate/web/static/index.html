<!DOCTYPE html>
<html lang="en" data-theme="light" data-font="geist">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ColorPlate — color-plate generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ---------- TOKENS ---------- */
  :root{
    --radius: 10px;
    --radius-sm: calc(var(--radius) * 0.6);
    --radius-lg: calc(var(--radius) * 1.5);
    --font-ui: "Geist", system-ui, sans-serif;
    --font-mono: "Geist Mono", ui-monospace, monospace;
    --accent: #F9CF26;
    --accent-strong: #f6c200;
    --accent-text: #1c1600;
    --speed: .18s;
  }
  html[data-font="plex"]{ --font-ui:"IBM Plex Sans", system-ui, sans-serif; --font-mono:"IBM Plex Mono", ui-monospace, monospace; }
  html[data-font="system"]{ --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; --font-mono:"JetBrains Mono", ui-monospace, monospace; }

  html[data-theme="dark"]{
    --bg:#0c0c0e; --bg-2:#141417; --bg-3:#1b1b1f; --bg-inset:#0e0e10;
    --border:#27272d; --border-2:#34343c; --border-focus:#4a4a54;
    --text:#f3f3f4; --text-2:#a2a2ab; --text-3:#6a6a73;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 30px rgba(0,0,0,.35);
    --shadow-pop: 0 12px 40px rgba(0,0,0,.55);
    --grid: rgba(255,255,255,.022);
    --check-a:#161619; --check-b:#1d1d21;
  }
  html[data-theme="light"]{
    --bg:#f4f4f1; --bg-2:#ffffff; --bg-3:#f3f3f0; --bg-inset:#fafaf8;
    --border:#e6e6e1; --border-2:#d8d8d2; --border-focus:#bcbcb4;
    --text:#18181b; --text-2:#5f5f66; --text-3:#9a9aa1;
    --shadow: 0 1px 2px rgba(20,20,20,.05), 0 8px 24px rgba(20,20,20,.06);
    --shadow-pop: 0 12px 40px rgba(20,20,20,.16);
    --grid: rgba(0,0,0,.025);
    --check-a:#eeeeea; --check-b:#f6f6f3;
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--font-ui);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    transition: background var(--speed) ease, color var(--speed) ease;
  }
  #root{ height:100%; }
  ::selection{ background:var(--accent); color:var(--accent-text); }
  .mono{ font-family:var(--font-mono); font-feature-settings:"tnum" 1, "ss01" 1; }

  /* ---------- SHELL ---------- */
  .topbar{
    height:56px; display:flex; align-items:center; gap:14px;
    padding:0 22px; border-bottom:1px solid var(--border);
    background:color-mix(in oklab, var(--bg-2) 70%, transparent);
    backdrop-filter:saturate(1.1) blur(8px); position:sticky; top:0; z-index:20;
  }
  .brand{ display:flex; align-items:center; gap:10px; font-weight:600; letter-spacing:-.01em; }
  .brand .logomark{ width:22px; height:22px; }
  .brand small{ color:var(--text-3); font-weight:500; white-space:nowrap; }
  .brand{ white-space:nowrap; }
  .topbar .spacer{ flex:1; }
  .pill{
    font-family:var(--font-mono); font-size:11.5px; color:var(--text-2);
    border:1px solid var(--border); padding:5px 10px; border-radius:999px;
    display:flex; align-items:center; gap:7px; background:var(--bg-2); white-space:nowrap;
  }
  .pill .dot{ width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 3px color-mix(in oklab, var(--accent) 25%, transparent); }
  .icon-btn{
    width:34px; height:34px; border-radius:var(--radius-sm); border:1px solid var(--border);
    background:var(--bg-2); color:var(--text-2); display:grid; place-items:center; cursor:pointer;
    transition: all var(--speed) ease;
  }
  .icon-btn:hover{ color:var(--text); border-color:var(--border-2); background:var(--bg-3); }

  .layout{
    display:grid; grid-template-columns: minmax(380px, 40%) 1fr;
    height: calc(100% - 56px); min-height:0;
  }
  /* fixed-height column that does NOT scroll itself; the .pad body scrolls, so
     the absolutely-positioned results sheet always covers the whole column */
  .col-left{ border-right:1px solid var(--border); overflow:hidden; background:var(--bg); position:relative; display:flex; flex-direction:column; }
  .col-right{ overflow:auto; background:var(--bg); position:relative; }
  .pad{ padding:24px; display:flex; flex-direction:column; gap:18px; flex:1 1 auto; min-height:0; overflow:auto; }

  .col-left::-webkit-scrollbar, .col-right::-webkit-scrollbar{ width:10px; height:10px; }
  .col-left::-webkit-scrollbar-thumb, .col-right::-webkit-scrollbar-thumb{ background:var(--border-2); border-radius:99px; border:3px solid var(--bg); }

  /* ---------- GENERIC PANEL BITS ---------- */
  .section-label{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--text-3); display:flex; align-items:center; gap:8px; margin-bottom:2px; white-space:nowrap;
  }
  .section-label .n{ color:var(--accent); }
  .hint{ font-size:12px; color:var(--text-3); line-height:1.45; }
  .group{ display:flex; flex-direction:column; gap:9px; }
  .group.is-disabled{ opacity:.4; pointer-events:none; filter:saturate(.4); }

  /* ---------- DROPZONE ---------- */
  .dropzone{
    border:1.5px dashed var(--border-2); border-radius:var(--radius);
    background:var(--bg-2); padding:26px 18px; text-align:center; cursor:pointer;
    transition: all var(--speed) ease; position:relative; overflow:hidden;
  }
  .dropzone:hover{ border-color:var(--border-focus); background:var(--bg-3); }
  .dropzone--over{ border-color:var(--accent); background:color-mix(in oklab, var(--accent) 8%, var(--bg-2)); transform: translateY(-1px); }
  .dropzone--busy{ pointer-events:none; }
  .dropzone .dz-ico{ color:var(--text-3); margin-bottom:10px; }
  .dropzone--over .dz-ico{ color:var(--accent); }
  .dropzone h4{ margin:0 0 4px; font-size:14px; font-weight:600; }
  .dropzone .formats{ font-family:var(--font-mono); font-size:11px; color:var(--text-3); margin-top:8px; }
  .dz-accent{ position:absolute; inset:0; pointer-events:none; opacity:0;
    background:radial-gradient(120px 80px at 50% 0, color-mix(in oklab,var(--accent) 22%, transparent), transparent 70%); }
  .dropzone--over .dz-accent{ opacity:1; }
  .dz-err{ color:#e0533d; font-size:12px; margin-top:8px; }

  .filecard{
    display:flex; align-items:center; gap:12px; padding:10px 12px;
    border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-2);
  }
  .filecard .thumb{
    width:42px; height:42px; border-radius:var(--radius-sm); flex:none; overflow:hidden;
    background:
      linear-gradient(45deg, var(--check-a) 25%, transparent 25%) 0 0/12px 12px,
      linear-gradient(-45deg, var(--check-a) 25%, transparent 25%) 0 6px/12px 12px,
      linear-gradient(45deg, transparent 75%, var(--check-a) 75%) 6px -6px/12px 12px,
      linear-gradient(-45deg, transparent 75%, var(--check-a) 75%) -6px 0/12px 12px,
      var(--check-b);
    display:grid; place-items:center; border:1px solid var(--border);
  }
  .filecard .thumb img{ width:100%; height:100%; object-fit:contain; padding:3px; }
  .filecard .meta{ min-width:0; flex:1; }
  .filecard .name{ font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .filecard .sub{ font-family:var(--font-mono); font-size:11px; color:var(--text-3); margin-top:2px; }
  .filecard .x{ color:var(--text-3); cursor:pointer; padding:5px; border-radius:6px; display:grid; place-items:center; }
  .filecard .x:hover{ color:var(--text); background:var(--bg-3); }

  /* ---------- SEGMENTED ---------- */
  .seg{ display:grid; grid-auto-flow:column; grid-auto-columns:1fr; gap:4px; padding:4px; background:var(--bg-3); border:1px solid var(--border); border-radius:var(--radius); }
  .seg button{
    font-family:var(--font-mono); font-size:13px; font-weight:500; padding:8px 0; border:0; cursor:pointer;
    background:transparent; color:var(--text-2); border-radius:var(--radius-sm); transition: all var(--speed) ease;
  }
  .seg button:hover{ color:var(--text); }
  .seg button[aria-pressed="true"]{ background:var(--bg-2); color:var(--text); box-shadow:var(--shadow); border:1px solid var(--border-2); }
  html[data-theme="dark"] .seg button[aria-pressed="true"]{ background:var(--bg); }

  /* ---------- INPUTS ---------- */
  .field{ display:flex; align-items:center; border:1px solid var(--border); background:var(--bg-2); border-radius:var(--radius); transition: border-color var(--speed) ease, box-shadow var(--speed) ease; }
  .field:focus-within{ border-color:var(--border-focus); box-shadow:0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent); }
  .field input{
    flex:1; min-width:0; background:transparent; border:0; outline:0; color:var(--text);
    font-family:var(--font-mono); font-size:14px; padding:10px 12px; font-weight:500;
  }
  .field .unit{ font-family:var(--font-mono); font-size:12px; color:var(--text-3); padding:0 12px 0 4px; }
  .field .stepper{ display:flex; flex-direction:column; border-left:1px solid var(--border); }
  .field .stepper button{ border:0; background:transparent; color:var(--text-3); cursor:pointer; height:18px; width:26px; display:grid; place-items:center; }
  .field .stepper button:hover{ color:var(--text); background:var(--bg-3); }
  .field .stepper button:first-child{ border-bottom:1px solid var(--border); }
  .twocol{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .lbl{ font-size:12.5px; color:var(--text-2); font-weight:500; margin-bottom:6px; display:block; }

  /* ---------- SELECT (backing) ---------- */
  .select{ position:relative; }
  .select__btn{ width:100%; display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--border); background:var(--bg-2); border-radius:var(--radius); cursor:pointer; color:var(--text); font-size:13.5px; font-weight:500; transition: border-color var(--speed) ease; }
  .select__btn:hover{ border-color:var(--border-2); }
  .select__btn .chev{ margin-left:auto; color:var(--text-3); }
  .select__menu{ position:absolute; left:0; right:0; top:calc(100% + 6px); z-index:50; background:var(--bg-2); border:1px solid var(--border-2); border-radius:var(--radius); box-shadow:var(--shadow-pop); padding:5px; max-height:260px; overflow:auto; }
  .select__menu--up{ top:auto; bottom:calc(100% + 6px); transform-origin:bottom; }
  .opt{ display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--radius-sm); cursor:pointer; font-size:13.5px; }
  .opt:hover{ background:var(--bg-3); }
  .opt[aria-selected="true"]{ background:color-mix(in oklab, var(--accent) 12%, var(--bg-3)); }
  .opt .check{ margin-left:auto; color:var(--accent); }

  .dotcol{ width:18px; height:18px; border-radius:5px; flex:none; box-shadow: inset 0 0 0 1px rgba(127,127,127,.35); }

  /* ---------- COLOR CONFIG ROWS ---------- */
  .crows{ display:flex; flex-direction:column; gap:8px; }
  .crow{
    border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-2);
    transition: border-color var(--speed) ease, box-shadow var(--speed) ease;
  }
  .crow--active{ border-color:var(--border-focus); box-shadow:var(--shadow); }
  .crow__main{ display:flex; align-items:center; gap:12px; padding:10px 12px; }
  .region-sw{ width:38px; height:38px; border-radius:var(--radius-sm); flex:none; position:relative; box-shadow: inset 0 0 0 1px rgba(127,127,127,.28); overflow:hidden; }
  .region-sw .reglabel{ position:absolute; bottom:0; left:0; right:0; font-family:var(--font-mono); font-size:8px; text-align:center; color:#fff; background:rgba(0,0,0,.4); padding:1px 0; letter-spacing:.04em; }
  .crow .arrow{ color:var(--text-3); flex:none; }
  .filchip{
    flex:1; min-width:0; display:flex; align-items:center; gap:10px; padding:7px 8px 7px 8px;
    border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg-3); cursor:pointer;
    transition: all var(--speed) ease;
  }
  .filchip:hover{ border-color:var(--border-2); }
  .filchip .sw{ width:24px; height:24px; border-radius:6px; flex:none; box-shadow: inset 0 0 0 1px rgba(127,127,127,.3); }
  .filchip .fname{ font-size:13px; font-weight:600; line-height:1.1; }
  .filchip .fhex{ font-family:var(--font-mono); font-size:11px; color:var(--text-3); margin-top:1px; }
  .badge{
    font-family:var(--font-mono); font-size:10.5px; font-weight:600; color:var(--text-2);
    border:1px solid var(--border-2); border-radius:6px; padding:3px 6px; flex:none; letter-spacing:.02em;
  }
  .filchip .caret{ color:var(--text-3); flex:none; }

  /* ---------- PICKER ---------- */
  .picker{ background:var(--bg-2); border:1px solid var(--border-2); border-radius:var(--radius); box-shadow:var(--shadow-pop); padding:13px; width:300px; }
  .picker--inline{ box-shadow:none; border:0; border-top:1px solid var(--border); border-radius:0; width:auto; padding:13px 12px 14px; background:transparent; }
  .picker .ptitle{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-3); margin-bottom:10px; }
  .picker__grid{ display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; }
  .preset{ display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; padding:5px 2px; border-radius:var(--radius-sm); border:1px solid transparent; transition: all var(--speed) ease; }
  .preset:hover{ background:var(--bg-3); border-color:var(--border); }
  .preset[aria-selected="true"]{ border-color:var(--accent); background:color-mix(in oklab, var(--accent) 10%, var(--bg-3)); }
  .preset .psw{ width:34px; height:34px; border-radius:8px; box-shadow: inset 0 0 0 1px rgba(127,127,127,.3); position:relative; }
  .preset[aria-selected="true"] .psw::after{ content:""; position:absolute; inset:0; border-radius:8px; box-shadow:0 0 0 2px var(--bg-2), 0 0 0 3.5px var(--accent); }
  .preset .pname{ font-size:10px; color:var(--text-2); text-align:center; line-height:1.15; }
  .picker .hexrow{ margin-top:12px; }
  .picker .hexrow .lbl{ margin-bottom:6px; }
  .hexfield{ display:flex; align-items:center; gap:0; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg-3); overflow:hidden; }
  .hexfield .hash{ font-family:var(--font-mono); color:var(--text-3); padding:0 4px 0 11px; font-size:13px; }
  .hexfield input{ flex:1; min-width:0; border:0; outline:0; background:transparent; color:var(--text); font-family:var(--font-mono); font-size:13px; padding:9px 6px; text-transform:uppercase; }
  .hexfield .live{ width:26px; height:26px; margin:4px; border-radius:6px; box-shadow: inset 0 0 0 1px rgba(127,127,127,.3); flex:none; }

  /* ---------- BUTTONS ---------- */
  .btn-primary{
    width:100%; display:flex; align-items:center; justify-content:center; gap:9px;
    background:var(--accent); color:var(--accent-text); border:0; cursor:pointer;
    font-family:var(--font-ui); font-size:14.5px; font-weight:600; padding:13px 16px;
    border-radius:var(--radius); transition: all var(--speed) ease; letter-spacing:-.01em;
  }
  .btn-primary:hover{ background:var(--accent-strong); transform: translateY(-1px); box-shadow:0 6px 20px color-mix(in oklab, var(--accent) 35%, transparent); }
  .btn-primary:active{ transform:translateY(0); }
  .btn-primary:disabled{ background:var(--bg-3); color:var(--text-3); cursor:not-allowed; box-shadow:none; transform:none; border:1px solid var(--border); }
  .btn-ghost{
    width:100%; display:flex; align-items:center; justify-content:center; gap:8px;
    background:var(--bg-2); color:var(--text); border:1px solid var(--border-2); cursor:pointer;
    font-size:13.5px; font-weight:500; padding:11px 16px; border-radius:var(--radius); transition: all var(--speed) ease;
  }
  .btn-ghost:hover{ background:var(--bg-3); border-color:var(--border-focus); }
  a.btn-primary, a.btn-ghost{ text-decoration:none; }

  .sticky-foot{ position:sticky; bottom:0; padding:16px 24px 22px; background:linear-gradient(to top, var(--bg) 62%, transparent); margin-top:auto; }

  /* ---------- PREVIEW ---------- */
  .preview-wrap{ height:100%; display:flex; flex-direction:column; min-height:0; }
  .preview-top{ display:flex; align-items:center; gap:10px; padding:16px 22px; border-bottom:1px solid var(--border); }
  .preview-top .ptab{ font-size:12.5px; color:var(--text-3); font-family:var(--font-mono); }
  .preview-stage{
    flex:1; min-height:0; display:grid; place-items:center; padding:36px; position:relative;
    background-image: radial-gradient(var(--grid) 1.4px, transparent 1.4px);
    background-size: 22px 22px;
  }
  .stage-card{ position:relative; display:flex; flex-direction:column; align-items:center; gap:26px; }
  .emblem-box{ filter: drop-shadow(0 24px 60px rgba(0,0,0,.30)); transition: filter var(--speed) ease; }
  img.art-preview{ max-width:min(360px, 60vw); max-height:46vh; object-fit:contain; }
  .empty-ill{ display:flex; flex-direction:column; align-items:center; gap:18px; color:var(--text-3); }
  .empty-ring{ width:150px; height:150px; border-radius:50%; border:2px dashed var(--border-2); display:grid; place-items:center; color:var(--text-3); position:relative; }
  .empty-ill h3{ margin:0; font-size:16px; color:var(--text-2); font-weight:600; }
  .empty-ill p{ margin:0; font-size:13px; }
  .status{
    display:flex; align-items:center; gap:14px; padding:13px 22px; border-top:1px solid var(--border);
    font-family:var(--font-mono); font-size:12px; color:var(--text-2); flex-wrap:wrap;
  }
  .status .sep{ color:var(--text-3); }
  .status .k{ display:flex; align-items:center; gap:7px; }
  .status .swrow{ display:flex; gap:4px; margin-left:auto; }
  .status .swrow .mini{ width:14px; height:14px; border-radius:4px; box-shadow: inset 0 0 0 1px rgba(127,127,127,.3); }

  /* swatch chip strip beneath emblem */
  .stage-legend{ display:flex; justify-content:center; gap:8px; flex-wrap:wrap; max-width:440px; }
  .legchip{ display:flex; align-items:center; gap:7px; background:var(--bg-2); border:1px solid var(--border); border-radius:999px; padding:5px 11px 5px 6px; box-shadow:var(--shadow); }
  .legchip .ls{ width:16px; height:16px; border-radius:50%; box-shadow: inset 0 0 0 1px rgba(127,127,127,.3); }
  .legchip .lt{ font-family:var(--font-mono); font-size:11px; color:var(--text-2); }

  /* ---------- RESULTS ---------- */
  .results-sheet{ position:absolute; inset:0; z-index:12; background:var(--bg); display:flex; flex-direction:column; animation: sheetin .26s cubic-bezier(.2,.7,.3,1); }
  @keyframes sheetin{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }
  .rs-head{ padding:24px 24px 12px; }
  .rs-list{ flex:1; min-height:0; overflow:auto; padding:0 24px 8px; display:flex; flex-direction:column; gap:8px; }
  .rs-foot{ padding:16px 24px 22px; display:flex; flex-direction:column; gap:8px; border-top:1px solid var(--border); background:var(--bg); }
  .results .rhead{ display:flex; align-items:center; gap:9px; margin-bottom:2px; }
  .results .rhead .ok{ width:20px; height:20px; border-radius:50%; background:var(--accent); color:var(--accent-text); display:grid; place-items:center; flex:none; }
  .results .rhead h4{ margin:0; font-size:14px; font-weight:600; }
  .file-row{ display:flex; align-items:center; gap:12px; padding:11px 12px; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-2); transition: all var(--speed) ease; animation: rise .3s ease backwards; }
  .file-row:hover{ border-color:var(--border-2); background:var(--bg-3); }
  .file-row .fi{ width:30px; height:30px; border-radius:7px; display:grid; place-items:center; flex:none; box-shadow: inset 0 0 0 1px rgba(127,127,127,.28); }
  .file-row .fn{ font-family:var(--font-mono); font-size:13px; font-weight:500; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .file-row .fsz{ font-family:var(--font-mono); font-size:11px; color:var(--text-3); }
  .file-row .dl{ width:30px; height:30px; border-radius:7px; border:1px solid var(--border); display:grid; place-items:center; color:var(--text-2); cursor:pointer; flex:none; background:var(--bg); }
  .file-row .dl:hover{ color:var(--text); border-color:var(--border-focus); }
  @keyframes rise{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:none; } }

  .spin{ animation: spin 1s linear infinite; } @keyframes spin{ to{ transform:rotate(360deg); } }

  .pop-anim{ animation: pop .15s ease; transform-origin: top; }
  @keyframes pop{ from{ opacity:0; transform:translateY(-6px) scale(.985); } to{ opacity:1; transform:none; } }
  .inline-anim{ animation: slidedown .2s ease; }
  @keyframes slidedown{ from{ opacity:0; transform:translateY(-6px); } to{ opacity:1; transform:none; } }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 880px){
    .layout{ grid-template-columns: 1fr; grid-template-rows: minmax(320px, 46vh) auto; height:auto; }
    .col-right{ border-bottom:1px solid var(--border); order:-1; }
    .col-left{ border-right:0; }
    .preview-wrap{ height:100%; }
  }
  .backdrop{ position:fixed; inset:0; z-index:25; }

  /* ---------- 3D PREVIEW ---------- */
  .view-toggle{ display:inline-flex; gap:3px; padding:3px; background:var(--bg-3); border:1px solid var(--border); border-radius:999px; }
  .view-toggle button{
    font-family:var(--font-mono); font-size:11px; font-weight:600; letter-spacing:.02em;
    padding:4px 12px; border:0; cursor:pointer; background:transparent; color:var(--text-3);
    border-radius:999px; transition: all var(--speed) ease;
  }
  .view-toggle button:hover{ color:var(--text); }
  .view-toggle button[aria-pressed="true"]{ background:var(--bg-2); color:var(--text); box-shadow:var(--shadow); }
  .three-wrap{
    position:relative; width:100%; height:100%; min-height:0; cursor:grab;
    /* soft studio floor — a grounding shadow pool behind the transparent canvas */
    background: radial-gradient(60% 26% at 50% 82%,
      color-mix(in oklab, var(--text) 14%, transparent), transparent 70%);
  }
  .three-wrap:active{ cursor:grabbing; }
  .three-wrap canvas{ position:relative; z-index:1; width:100% !important; height:100% !important; }
  .three-reset{
    position:absolute; top:14px; right:16px; z-index:2; display:inline-flex; align-items:center; gap:6px;
    font-family:var(--font-mono); font-size:11px; font-weight:600; color:var(--text-2);
    padding:6px 11px; border:1px solid var(--border-2); border-radius:999px; cursor:pointer;
    background:color-mix(in oklab, var(--bg-2) 80%, transparent); backdrop-filter:blur(6px);
    transition: all var(--speed) ease;
  }
  .three-reset:hover{ color:var(--text); border-color:var(--border-focus); background:var(--bg-2); }
  .three-overlay{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center; gap:10px;
    color:var(--text-3); font-size:13px; font-family:var(--font-mono); pointer-events:none;
    background:color-mix(in oklab, var(--bg) 40%, transparent);
  }
  .three-overlay.err{ color:#e0533d; padding:0 24px; text-align:center; }
  .three-hint{
    position:absolute; left:0; right:0; bottom:12px; text-align:center; pointer-events:none;
    font-family:var(--font-mono); font-size:10.5px; letter-spacing:.04em; color:var(--text-3); opacity:.7;
  }

  /* ---------- SINGLE-EXTRUDER CONTROLS ---------- */
  .stack-list, .swap-list{ display:flex; flex-direction:column; gap:6px; }
  .stack-row, .swap-row{
    display:flex; align-items:center; gap:10px; padding:8px 10px;
    border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg-2);
  }
  .stack-row .sw, .swap-row .sw{ width:18px; height:18px; border-radius:5px; flex:none; box-shadow: inset 0 0 0 1px rgba(127,127,127,.3); }
  .stack-row .snm, .swap-row .snm{ font-size:13px; font-weight:600; }
  .stack-row .badge{ font-family:var(--font-mono); font-size:10px; }
  .stack-btns{ margin-left:auto; display:flex; gap:4px; }
  .stack-btns button{
    width:24px; height:24px; border:1px solid var(--border); border-radius:6px; background:var(--bg-3);
    color:var(--text-2); cursor:pointer; font-size:12px; line-height:1; display:grid; place-items:center;
    transition: all var(--speed) ease;
  }
  .stack-btns button:hover:not(:disabled){ color:var(--text); border-color:var(--border-focus); }
  .stack-btns button:disabled{ opacity:.3; cursor:not-allowed; }
  .swap-row .swap-z{ margin-left:auto; font-size:11px; color:var(--text-2); }
  .swap-row .swap-layer{
    font-size:10.5px; color:var(--text-3); border:1px solid var(--border-2);
    border-radius:5px; padding:2px 6px; flex:none;
  }
</style>
<script>
  // Restore the saved theme before first paint to avoid a flash.
  try {
    var th = localStorage.getItem("colorplate-theme");
    if (th === "light" || th === "dark") document.documentElement.setAttribute("data-theme", th);
  } catch (e) {}
</script>
